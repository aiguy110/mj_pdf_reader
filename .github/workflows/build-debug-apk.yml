name: Build Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - feature/reference-viewer

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # This repo's root gradle/wrapper/gradle-wrapper.jar is not committed (pre-existing,
      # unrelated to this workflow), so ./gradlew cannot bootstrap here. Provision Gradle
      # directly instead, matching the version in gradle/wrapper/gradle-wrapper.properties.
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Create local.properties placeholders
        run: |
          cat <<EOF > local.properties
          AI=placeholder-app-id
          AK=placeholder-api-key
          AU=placeholder-api-uri
          EOF

      # PdfiumAndroid/build.gradle expects prebuilt .so files under src/main/libs
      # (jniLibs.srcDir); they aren't checked into git (see PdfiumAndroid/src/main/jni/lib,
      # which vendors the pdfium/freetype/libpng prebuilt .so consumed by Android.mk) and
      # must be produced by ndk-build before the app module is assembled, or PDF loading
      # fails at runtime with UnsatisfiedLinkError: nativeOpenDocument.
      - name: Install NDK
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --install "ndk;26.1.10909125"

      - name: Build PdfiumAndroid native libraries
        run: "$ANDROID_HOME/ndk/26.1.10909125/ndk-build NDK_PROJECT_PATH=$(pwd)"
        working-directory: PdfiumAndroid/src/main

      - name: Build debug APK
        run: gradle :app:assembleDebug --stacktrace

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
